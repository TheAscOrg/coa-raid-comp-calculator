<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CoA Raid Comp Calculator (Buff Counters)</title>
    <style>
        :root {
            --bg: #0a0b0c;
            --panel: #151719;
            --panel-2: #202326;
            --line: #5c6367;
            --line-on: #c6d1d2;
            --text: #eef1f2;
            --muted: #aeb6b9;
            --accent: #c8d0d2;
            --accent-rgb: 200, 208, 210;
            --teal: #57b9a8;
            --teal-rgb: 87, 185, 168;
            --red: #b74b42;
            --red-rgb: 183, 75, 66;
            --inactive: #363b3e;
            --slot-bg: #0d0f10;
            --slot-border: #565e62;
            --active-green: #58df9a;
            --active-text: #f6f1e8;
            --text-inactive: #858b8e;
            --preview-glow: #e4eaec;
            --marble: #101214;
            --menu-marble: #1b1e20;
            --black-marble: #070808;
            font-family: "Segoe UI", Arial, sans-serif;

            --class-barbarian: #C79C6E;
            --class-witchdoctor: #0070DE;
            --class-felsworn: #A330C9;
            --class-witchhunter: #ABD473;
            --class-stormbringer: #00FF96;
            --class-cultist: #9482C9;
            --class-knightofxoroth: #C41F3B;
            --class-knightxoroth: #C41F3B;
            --class-guardian: #FFF569;
            --class-starcaller: #40C7EB;
            --class-suncleric: #F58CBA;
            --class-templar: #F0E68C;
            --class-primalist: #FF7D0A;
            --class-bloodmage: #880000;
            --class-pyromancer: #69CCF0;
            --class-runemaster: #FF00FF;
            --class-ranger: #ABD473;
            --class-reaper: #8787ED;
            --class-chronomancer: #FFB81C;
            --class-necromancer: #3FC7EB;
            --class-venomancer: #00FF96;
            --class-tinker: #A9D271;
        }

        * {
            box-sizing: border-box;
        }

        * {
            scrollbar-color: #6a7073 rgba(5, 6, 7, 0.5);
            scrollbar-width: thin;
        }

        ::-webkit-scrollbar {
            width: 10px;
            height: 10px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(5, 6, 7, 0.5);
        }

        ::-webkit-scrollbar-thumb {
            background: #535a5d;
            border: 2px solid rgba(5, 6, 7, 0.72);
            border-radius: 999px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #6a7073;
        }

        body {
            margin: 0;
            min-height: 100vh;
            min-width: 1120px;
            color: var(--text);
            background: var(--marble);
            background-attachment: fixed;
        }

        .app-shell {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 720px 1fr;
        }

        .class-rail {
            min-width: 0;
            max-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-right: 1px solid #34383b;
            background: var(--menu-marble);
            padding: 8px 10px;
        }

        .rail-title {
            color: var(--muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 6px;
        }

        .spec-rail-title {
            margin-top: 6px;
        }

        .workspace {
            min-width: 0;
            display: grid;
            grid-template-rows: auto 1fr;
        }

        .topbar {
            display: grid;
            grid-template-columns: minmax(260px, 1fr) auto;
            align-items: center;
            gap: 18px;
            padding: 18px 22px 12px;
            border-bottom: 1px solid #34383b;
            background: var(--menu-marble);
        }

        .class-heading {
            min-width: 0;
            display: grid;
            grid-template-columns: 52px minmax(0, 1fr);
            align-items: center;
            gap: 13px;
        }

        .class-heading > div {
            min-width: 0;
        }

        .class-header-icon {
            width: 48px;
            height: 48px;
            display: block;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background-color: #0b0c0d;
            background-image: url("./assets/icons/achievement_dungeon_coablackdragonflight.png");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.1), 0 0 18px rgba(var(--accent-rgb), 0.15);
        }

        .data-status {
            margin-top: 4px;
            color: var(--muted);
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .tree-stage {
            position: relative;
            min-height: 0;
            overflow: hidden;
            border: 1px solid rgba(var(--accent-rgb), 0.26);
            background: var(--black-marble);
            background-size: auto, auto, cover;
            background-position: center;
            background-repeat: no-repeat;
            box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.035) inset, 0 16px 42px rgba(0, 0, 0, 0.38);
        }

        .tree-stage::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            z-index: 0;
            pointer-events: none;
            background: #151719;
            border-bottom: 1px solid rgba(var(--accent-rgb), 0.16);
            box-shadow: inset 0 1px 0 rgba(var(--accent-rgb), 0.11);
        }

        h1 {
            margin: 0;
            color: var(--accent);
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0;
            text-shadow: 0 0 14px rgba(var(--accent-rgb), 0.12);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .container {
            display: grid;
            grid-template-columns: minmax(390px, 450px) minmax(660px, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1680px;
            align-items: start;
        }

        .left-col {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .raid-composition {
            display: grid;
            grid-template-columns: max-content minmax(138px, 1fr);
            align-items: stretch;
            gap: 10px;
        }

        .raid-roster {
            display: flex;
            flex-direction: column;
            gap: 7px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(var(--accent-rgb), 0.2);
            background: var(--black-marble);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.035);
        }

        .raid-group {
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 4px;
        }

        .raid-group-label {
            color: var(--accent);
            font-size: 11px;
            font-weight: 900;
            line-height: 1;
            text-transform: uppercase;
            letter-spacing: 0;
        }

        .raid-group-slots {
            display: grid;
            grid-template-columns: repeat(5, 76px);
            gap: 7px;
        }

        .raid-slot {
            aspect-ratio: 1;
            background-color: var(--slot-bg);
            border: 1px solid var(--slot-border);
            border-radius: 6px;
            cursor: pointer;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.16s ease, box-shadow 0.16s ease;
            overflow: hidden;
            user-select: none;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.035);
        }

        .raid-slot.filled {
            cursor: grab;
        }

        .raid-slot.filled:active {
            cursor: grabbing;
        }

        .raid-slot.dragging {
            opacity: 0.55;
            border-color: #f4d381;
        }

        .raid-slot.drop-target {
            border-color: #f4d381;
            box-shadow: 0 0 16px rgba(244, 211, 129, 0.26), inset 0 0 0 1px rgba(244, 211, 129, 0.18);
        }

        .raid-slot::before {
            display: none;
        }

        .raid-slot:hover {
            border-color: var(--accent);
            box-shadow: inset 0 0 0 1px rgba(var(--accent-rgb), 0.12);
        }

        .raid-slot.filled {
            border-color: var(--accent);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.055);
        }

        .raid-slot .spec-initials {
            z-index: 2;
            color: #fffaf0;
            font-size: 10px;
            font-weight: 900;
            line-height: 1.1;
            text-align: center;
            text-shadow: 0 1px 3px rgba(0, 0, 0, 0.78);
        }

        .raid-slot .placeholder-text {
            z-index: 1;
            color: #777f83;
            font-size: 10px;
            font-weight: 800;
        }
        
        .raid-slot .remove-hint {
            position: absolute;
            inset: 0;
            z-index: 3;
            background: rgba(5, 6, 7, 0.78);
            color: #ff8a7f;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            font-size: 16px;
            font-weight: 900;
            transition: opacity 0.16s ease;
        }

        .raid-slot.filled:hover .remove-hint { opacity: 1; }

        .raid-role-summary {
            display: grid;
            grid-template-rows: repeat(4, 1fr);
            gap: 7px;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid rgba(var(--accent-rgb), 0.18);
            background: var(--black-marble);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.035);
        }

        .raid-role-row {
            min-height: 0;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 6px;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: #111416;
            color: var(--text);
            font-size: 12px;
            font-weight: 900;
        }

        .raid-role-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            min-width: 0;
        }

        .raid-role-label {
            color: #f2ead8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .raid-role-count {
            color: var(--accent);
            font-variant-numeric: tabular-nums;
            flex: 0 0 auto;
        }

        .raid-role-icons {
            display: flex;
            flex-wrap: wrap;
            align-content: flex-start;
            gap: 5px;
            min-height: 28px;
        }

        .raid-role-icon {
            width: 26px;
            height: 26px;
            flex: 0 0 26px;
            border-radius: 5px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            overflow: hidden;
            background: #0b0d0e;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.32);
        }

        .raid-role-icon .spec-fallback {
            font-size: 9px;
            font-weight: 900;
            color: #fffaf0;
        }

        .raid-role-empty {
            color: #6f777b;
            font-size: 11px;
            font-weight: 800;
            align-self: center;
        }

        .spec-picker {
            flex: 1 1 auto;
            min-height: 0;
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #34383b;
            overflow-y: auto;
            transition: opacity 0.2s;
            background: var(--menu-marble);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.035);
        }

        .role-section { margin-bottom: 8px; }

        .role-section:last-child { margin-bottom: 0; }
        
        .role-header { 
            min-height: 24px;
            display: flex;
            align-items: center;
            font-size: 12px; 
            font-weight: 900; 
            margin-bottom: 5px; 
            color: var(--accent);
            background: #101213;
            padding: 0 8px;
            border: 1px solid rgba(var(--accent-rgb), 0.16);
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .spec-list { display: flex; flex-wrap: wrap; gap: 6px; }

        .spec-btn {
            width: 48px;
            height: 48px;
            border: 1px solid rgba(255, 255, 255, 0.24);
            border-radius: 7px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.16s ease, box-shadow 0.16s ease, opacity 0.16s ease, filter 0.16s ease, transform 0.16s ease;
            font-size: 10px;
            font-weight: 900;
            color: white;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.82);
            text-align: center;
            position: relative;
            box-shadow: inset 0 0 0 1px rgba(0, 0, 0, 0.36);
        }

        .spec-icon,
        .slot-icon {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
            border-radius: inherit;
            pointer-events: none;
        }

        .spec-fallback {
            display: grid;
            place-items: center;
            width: 100%;
            height: 100%;
        }

        .spec-btn::before {
            display: none;
        }

        .spec-btn:hover {
            z-index: 10;
            border-color: #eef2f3;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.12);
        }

        .spec-picker.highlighting-active .spec-btn {
            opacity: 0.38;
            filter: saturate(0.55) brightness(0.75);
        }

        .spec-picker.highlighting-active .spec-btn.highlighted {
            opacity: 1;
            z-index: 20;
            filter: saturate(1.28) brightness(1.16);
            border-color: #fff6d8;
            box-shadow:
                0 0 0 2px rgba(255, 246, 216, 0.82),
                0 0 18px 4px rgba(var(--accent-rgb), 0.56),
                0 0 34px 8px rgba(var(--accent-rgb), 0.26),
                inset 0 0 0 2px rgba(255, 255, 255, 0.24);
            transform: translateY(-1px);
        }

        .buff-dashboard {
            position: relative;
            z-index: 1;
            padding: 68px 22px 22px;
            border-radius: 0;
            border: 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            column-gap: 20px;
            row-gap: 10px;
            align-content: start;
            background: transparent;
            box-shadow: none;
        }

        .dashboard-column { display: contents; }

        .dashboard-section { min-width: 0; }

        .physical-buffs-section { grid-column: 1; grid-row: 1; }
        .physical-debuffs-section { grid-column: 2; grid-row: 1; }
        .caster-buffs-section { grid-column: 1; grid-row: 2; }
        .magic-debuffs-section { grid-column: 2; grid-row: 2; }
        .utility-buffs-section { grid-column: 1; grid-row: 3; }
        .utility-debuffs-section { grid-column: 2; grid-row: 3; }

        .dashboard-group-title {
            --section-color: #d6a445;
            --section-color-rgb: 214, 164, 69;
            position: absolute;
            top: 0;
            right: 22px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            z-index: 2;
            pointer-events: none;
            color: #f0e4c3;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            text-shadow: 0 0 12px rgba(var(--section-color-rgb), 0.2);
        }

        .section-title {
            --section-color: var(--accent);
            --section-color-rgb: var(--accent-rgb);
            min-height: 36px;
            display: flex;
            align-items: center;
            position: relative;
            margin-bottom: 9px;
            padding: 0 11px 0 16px;
            color: #f4f0e6;
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            border: 1px solid rgba(var(--section-color-rgb), 0.34);
            border-radius: 7px;
            background: #101213;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 0 0 1px rgba(0, 0, 0, 0.22);
            text-shadow: 0 0 12px rgba(var(--section-color-rgb), 0.22);
        }

        .section-title::before {
            content: "";
            position: absolute;
            left: 7px;
            top: 8px;
            bottom: 8px;
            width: 3px;
            border-radius: 999px;
            background: var(--section-color);
            box-shadow: 0 0 12px rgba(var(--section-color-rgb), 0.32);
        }

        .section-title.physical-buff {
            --section-color: #d16b54;
            --section-color-rgb: 209, 107, 84;
        }

        .section-title.caster-buff {
            --section-color: #6aa9d8;
            --section-color-rgb: 106, 169, 216;
        }

        .section-title.utility-buff {
            --section-color: #72b88f;
            --section-color-rgb: 114, 184, 143;
        }

        .section-title.physical-debuff {
            --section-color: #e06a5d;
            --section-color-rgb: 224, 106, 93;
            color: #ffe1dd;
        }

        .section-title.magic-debuff {
            --section-color: #a984d6;
            --section-color-rgb: 169, 132, 214;
            color: #eadfff;
        }

        .section-title.utility-debuff {
            --section-color: #d6a445;
            --section-color-rgb: 214, 164, 69;
            color: #f6e6c3;
        }
        
        .buff-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(156px, 1fr));
            gap: 6px;
        }

        .buff-item {
            min-height: 36px;
            background: #151719;
            color: var(--text-inactive);
            padding: 6px 7px 6px 10px;
            border-radius: 7px;
            font-size: 12px;
            line-height: 1.2;
            display: flex;
            align-items: center;
            gap: 8px;
            justify-content: space-between;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: border-color 0.16s ease, box-shadow 0.16s ease, color 0.16s ease, background 0.16s ease;
            cursor: help;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.025);
        }

        .buff-item:hover {
            color: var(--text);
            border-color: rgba(var(--accent-rgb), 0.3);
            background: #1d2123;
        }

        .buff-item.active {
            background: #13201f;
            color: var(--active-text);
            border-color: rgba(var(--teal-rgb), 0.52);
            box-shadow: inset 3px 0 0 var(--teal);
        }

        .buff-item.preview-active {
            border-color: var(--preview-glow);
            box-shadow: inset 0 0 0 1px rgba(var(--accent-rgb), 0.28);
            color: var(--text);
        }

        .buff-item.active.preview-active {
            border-color: #eef2f3;
            box-shadow: inset 3px 0 0 var(--teal), inset 0 0 0 1px rgba(var(--accent-rgb), 0.2);
        }

        .buff-item .status-icon {
            width: 20px; 
            height: 20px; 
            border-radius: 50%; 
            flex: 0 0 20px;
            background: #0c0d0e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: 900;
            color: #727b80;
            border: 1px solid #4d5559;
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.05);
        }
        
        .buff-item.active .status-icon { 
            background: #12362f;
            border-color: var(--teal);
            box-shadow: none;
            color: #eafff8;
        }

        #tooltip {
            position: fixed;
            background: #0d0f10;
            border: 1px solid #686f73;
            padding: 0;
            border-radius: 7px;
            pointer-events: none;
            display: none;
            z-index: 1000;
            width: 300px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.48);
            overflow: hidden;
        }

        #tooltip-header {
            background: #171a1c;
            padding: 9px 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.13);
        }

        #tooltip-header h4 {
            margin: 0;
            color: #eef2f3;
            font-size: 15px;
            line-height: 1.15;
        }

        #tooltip-header span {
            display: block;
            margin-top: 3px;
            font-size: 11px;
            color: var(--muted);
            font-weight: 800;
            letter-spacing: 0.04em;
        }

        .tooltip-body { padding: 10px; display: flex; flex-direction: column; gap: 8px; }

        .tooltip-section h5 {
            margin: 0 0 4px 0;
            color: var(--muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid rgba(255, 255, 255, 0.11);
            padding-bottom: 3px;
        }

        .tooltip-list { margin: 0; padding-left: 18px; font-size: 11px; color: #ddd8ce; }
        .tooltip-list li { margin-bottom: 1px; }
        .tooltip-debuff { color: #ff9a90; }
        .tooltip-empty { color: #777f83; }
        
        .roster-controls {
            min-height: 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
            border: 1px solid #34383b;
            border-radius: 8px;
            background: var(--menu-marble);
            color: var(--muted);
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.035);
        }

        .roster-controls strong,
        .roster-controls span {
            color: var(--text);
        }

        .roster-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn {
            min-height: 28px;
            border: 1px solid #555d61;
            border-radius: 7px;
            padding: 0 10px;
            color: var(--text);
            background: #202326;
            cursor: pointer;
            font: inherit;
        }

        .btn:hover {
            border-color: #c8d0d2;
        }

        .btn-clear {
            border-color: rgba(var(--red-rgb), 0.58);
            background: #2b1b1b;
        }

        .btn-clear:hover {
            border-color: #ff8a7f;
            box-shadow: 0 0 0 2px rgba(var(--red-rgb), 0.12);
        }

        .btn-size {
            color: #f0f3f3;
            border-color: rgba(var(--accent-rgb), 0.32);
        }

        .btn-size:hover {
            border-color: #eef2f3;
        }

        .spec-btn[data-class="BARBARIAN"] { background: var(--class-barbarian); }
        .spec-btn[data-class="WITCHDOCTOR"] { background: var(--class-witchdoctor); }
        .spec-btn[data-class="FELSWORN"] { background: var(--class-felsworn); }
        .spec-btn[data-class="WITCHHUNTER"] { background: var(--class-witchhunter); }
        .spec-btn[data-class="STORMBRINGER"] { background: var(--class-stormbringer); }
        .spec-btn[data-class="CULTIST"] { background: var(--class-cultist); }
        .spec-btn[data-class="KNIGHTXOROTH"] { background: var(--class-knightofxoroth); }
        .spec-btn[data-class="GUARDIAN"] { background: var(--class-guardian); }

    renderRoster();

function renderRoster() {
    const el = document.getElementById('raidRoster');
    el.innerHTML = '';

    for (let groupIndex = 0; groupIndex < Math.ceil(roster.length / 5); groupIndex += 1) {
        const group = document.createElement('div');
        group.className = 'raid-group';

        const label = document.createElement('div');
        label.className = 'raid-group-label';
        label.innerText = `Group ${groupIndex + 1}`;
        group.appendChild(label);

        const slots = document.createElement('div');
        slots.className = 'raid-group-slots';

        for (let offset = 0; offset < 5; offset += 1) {
            const index = groupIndex * 5 + offset;
            if (index >= roster.length) continue;

            const slot = roster[index];
            const div = document.createElement('div');
            div.className = `raid-slot ${slot ? 'filled' : ''}`;
            div.dataset.index = index;
            div.draggable = !!slot;
            div.onclick = () => {
                if (suppressRosterClick) {
                    suppressRosterClick = false;
                    return;
                }
                removeSlot(index);
            };
            div.ondragstart = (e) => handleSlotDragStart(e, index);
            div.ondragover = (e) => handleSlotDragOver(e, index);
            div.ondragenter = (e) => handleSlotDragOver(e, index);
            div.ondragleave = (e) => e.currentTarget.classList.remove('drop-target');
            div.ondrop = (e) => handleSlotDrop(e, index);
            div.ondragend = handleSlotDragEnd;
            div.onmousedown = (e) => handleSlotPointerDown(e, index);
            
            if (slot) {
                div.style.backgroundColor = getComputedStyle(document.body).getPropertyValue(`--class-${slot.class.toLowerCase()}`);
                
                div.appendChild(createSpecIcon(slot.class, slot.specName, 'slot-icon'));

                const removeHint = document.createElement('div');
                removeHint.className = 'remove-hint';
                removeHint.innerText = 'X';
                div.appendChild(removeHint);

                div.onmouseenter = (e) => showTooltip(e, slot);
                div.onmouseleave = hideTooltip;
            } else {
                const ph = document.createElement('div');
                ph.className = 'placeholder-text';
                ph.innerText = (index + 1);
                div.appendChild(ph);
            }
            slots.appendChild(div);
        }

        group.appendChild(slots);
        el.appendChild(group);
    }

    const count = roster.filter(x => x).length;
    document.getElementById('count').innerText = count;
    document.getElementById('capacity').innerText = roster.length;
    document.getElementById('raidSizeStatus').innerText = `${roster.length} Player Raid`;

    const sizeButton = document.getElementById('rosterSizeButton');
    if (sizeButton) {
        sizeButton.disabled = roster.length >= MAX_ROSTER_SIZE;
        sizeButton.innerText = roster.length >= MAX_ROSTER_SIZE ? '25 Slots' : 'Expand to 25';
    }

    renderRoleSummary();
}

function renderRoleSummary() {
    const el = document.getElementById('raidRoleSummary');
    if (!el) return;

    const counts = { TANK: 0, HEALER: 0, SUPPORT: 0, DPS: 0 };
    const grouped = { TANK: [], HEALER: [], SUPPORT: [], DPS: [] };
    roster.forEach(slot => {
        if (!slot) return;
        const roleKey = (slot.role === "MELEE" || slot.role === "CASTER") ? "DPS" : slot.role;
        if (counts[roleKey] === undefined) return;
        counts[roleKey] += 1;
        grouped[roleKey].push(slot);
    });

    el.innerHTML = '';
    RAID_ROLE_TARGETS.forEach(item => {
        const row = document.createElement('div');
        row.className = 'raid-role-row';

        const header = document.createElement('div');
        header.className = 'raid-role-header';

        const label = document.createElement('span');
        label.className = 'raid-role-label';
        label.innerText = item.label;

        const count = document.createElement('span');
        count.className = 'raid-role-count';
        count.innerText = counts[item.key] ? counts[item.key] : '';

        header.appendChild(label);
        header.appendChild(count);

        const icons = document.createElement('div');
        icons.className = 'raid-role-icons';

        if (grouped[item.key].length) {
            grouped[item.key].forEach(slot => {
                const icon = document.createElement('div');
                icon.className = 'raid-role-icon';
                icon.style.backgroundColor = getComputedStyle(document.body).getPropertyValue(`--class-${slot.class.toLowerCase()}`);
                icon.title = `${formatClassName(slot.class)} - ${formatSpecName(slot.specName)}`;
                icon.appendChild(createSpecIcon(slot.class, slot.specName, 'spec-icon'));
                icons.appendChild(icon);
            });
        } else {
            const empty = document.createElement('span');
            empty.className = 'raid-role-empty';
            empty.innerText = 'Empty';
            icons.appendChild(empty);
        }

        row.appendChild(header);
        row.appendChild(icons);
        el.appendChild(row);
    });
}

function renderPicker() {
    const el = document.getElementById('specPicker');
    el.innerHTML = '';
    
    // Group specs by Role
    const specsByRole = {};
    DISPLAY_ROLES.forEach(r => specsByRole[r] = []);

    // Iterate Classes and group specs
    Object.keys(DB).sort().forEach(cls => {
        DB[cls].specs.forEach(spec => {
            const role = spec.role;
            if (specsByRole[role]) {
                specsByRole[role].push({
                    class: cls,
                    specName: spec.name,
                    role: role,
                    data: spec
                });
            }
        });
    });

    // Render Roles
    DISPLAY_ROLES.forEach(role => {
        const roleDiv = document.createElement('div');
        roleDiv.className = 'role-section';
        
        const header = document.createElement('div');
        header.className = 'role-header';
        header.innerText = DISPLAY_ROLE_NAMES[role];
        roleDiv.appendChild(header);

        const list = document.createElement('div');
        list.className = 'spec-list';

        // Sort by Class Name
        specsByRole[role].sort((a,b) => a.class.localeCompare(b.class));

        specsByRole[role].forEach(item => {
            const btn = document.createElement('div');
            btn.className = 'spec-btn';
            btn.dataset.class = item.class;
            btn.dataset.spec = item.specName;
            const displaySpecName = formatSpecName(item.specName);
            const displayClassName = formatClassName(item.class);
            btn.title = `${displayClassName} - ${displaySpecName}`;
            btn.setAttribute('aria-label', `${displayClassName} ${displaySpecName}`);
            btn.appendChild(createSpecIcon(item.class, item.specName, 'spec-icon'));
            btn.onclick = () => addSpec(item.class, item.specName);
            
            // PRE-CALCULATE BUFF IDS FOR REVERSE HIGHLIGHTING
            const allBuffs = [
                ...DB[item.class].classBuffs,
                ...DB[item.class].classResists,
                ...item.data.buffs,
                ...item.data.debuffs
            ];
            btn.dataset.provides = allBuffs.map(b => simplify(b)).join(' ');

            const previewData = {
                class: item.class,
                specName: item.specName,
                classBuffs: DB[item.class].classBuffs,
                classResists: DB[item.class].classResists,
                specBuffs: item.data.buffs,
                specDebuffs: item.data.debuffs
            };

            // COMBINED INTERACTION: Tooltip + Buff Highlighting
            btn.onmouseenter = (e) => {
                showTooltip(e, previewData);
                highlightBuffs(previewData);
            };
            btn.onmouseleave = () => {
                hideTooltip();
                clearBuffHighlights();
            };
            list.appendChild(btn);
        });

        roleDiv.appendChild(list);
        el.appendChild(roleDiv);
    });
}

function renderBuffDashboard() {
    const map = {
        physicalBuffs: "physicalBuffs",
        casterBuffs: "casterBuffs",
        utilityBuffs: "utilityBuffs",
        physicalDebuffs: "physicalDebuffs",
        magicDebuffs: "magicDebuffs",

    for (const [cat, buffs] of Object.entries(UI_CATEGORIES)) {

            const nameSpan = document.createElement('span');
            nameSpan.innerText = displayName;
            
            const icon = document.createElement('div');
            icon.className = 'status-icon';
            // Placeholder for count
            icon.innerText = "";

            div.appendChild(nameSpan);
            div.appendChild(icon);
            container.appendChild(div);

}

// --- HIGHLIGHTING LOGIC (HOVER BUFF -> SHOW SPECS) ---
function highlightSource(buffId) {
    const picker = document.getElementById('specPicker');
    picker.classList.add('highlighting-active');
    const buttons = document.querySelectorAll('.spec-btn');
    buttons.forEach(btn => {
        if (btn.dataset.provides && btn.dataset.provides.includes(buffId)) {
            btn.classList.add('highlighted');
        } else {
            btn.classList.remove('highlighted');
        }
    });
}
function clearSourceHighlights() {
    const picker = document.getElementById('specPicker');
    picker.classList.remove('highlighting-active');
    const buttons = document.querySelectorAll('.spec-btn');
    buttons.forEach(btn => btn.classList.remove('highlighted'));
}

// --- HIGHLIGHTING LOGIC (HOVER SPEC -> SHOW BUFFS) ---
function highlightBuffs(data) {
    const allBuffs = [
        ...data.classBuffs,
        ...data.classResists,
        ...data.specBuffs,
        ...data.specDebuffs
    ];
    
    allBuffs.forEach(buffName => {
        const id = `buff-${simplify(buffName)}`;
        const el = document.getElementById(id);
        if (el) {
            el.classList.add('preview-active');
        }
    });
}

function clearBuffHighlights() {
    const els = document.querySelectorAll('.buff-item.preview-active');
    els.forEach(el => el.classList.remove('preview-active'));
}

// --- ROSTER LOGIC ---
function handleSlotDragStart(event, index) {
    if (!roster[index]) {
        event.preventDefault();
        return;
    }

    draggedRosterIndex = index;
    event.currentTarget.classList.add('dragging');
    event.dataTransfer.effectAllowed = 'move';
    event.dataTransfer.setData('text/plain', String(index));
    hideTooltip();
}

function handleSlotDragOver(event, index) {
    if (draggedRosterIndex === null || draggedRosterIndex === index) return;
    event.preventDefault();
    event.dataTransfer.dropEffect = 'move';
    event.currentTarget.classList.add('drop-target');
}

function handleSlotDrop(event, index) {
    event.preventDefault();

    const sourceIndex = draggedRosterIndex;
    clearRosterDragState();
    if (sourceIndex === null || sourceIndex === index) return;

    const movingSlot = roster[sourceIndex];
    roster[sourceIndex] = roster[index];
    roster[index] = movingSlot;
    suppressRosterClick = true;
    renderRoster();
    updateDashboard();
}

function handleSlotDragEnd() {
    clearRosterDragState();
}

function clearRosterDragState() {
    document.querySelectorAll('.raid-slot.dragging, .raid-slot.drop-target').forEach(slot => {
        slot.classList.remove('dragging', 'drop-target');
    });
    draggedRosterIndex = null;
}

function handleSlotPointerDown(event, index) {
    if (event.button !== 0 || !roster[index]) return;

    pointerRosterDrag = {
        index,
        startX: event.clientX,
        startY: event.clientY,
        dragging: false
    };

    document.addEventListener('mousemove', handleSlotPointerMove);
    document.addEventListener('mouseup', handleSlotPointerUp, { once: true });
}

function handleSlotPointerMove(event) {
    if (!pointerRosterDrag) return;

    const dx = event.clientX - pointerRosterDrag.startX;
    const dy = event.clientY - pointerRosterDrag.startY;
    if (!pointerRosterDrag.dragging && Math.hypot(dx, dy) < 6) return;

    pointerRosterDrag.dragging = true;
    suppressRosterClick = true;
    hideTooltip();

    const sourceSlot = document.querySelector(`.raid-slot[data-index="${pointerRosterDrag.index}"]`);
    sourceSlot?.classList.add('dragging');

    document.querySelectorAll('.raid-slot.drop-target').forEach(slot => slot.classList.remove('drop-target'));
    const targetSlot = getRosterSlotFromPoint(event.clientX, event.clientY);
    if (targetSlot && Number(targetSlot.dataset.index) !== pointerRosterDrag.index) {
        targetSlot.classList.add('drop-target');
    }
}

function handleSlotPointerUp(event) {
    document.removeEventListener('mousemove', handleSlotPointerMove);

    if (!pointerRosterDrag) return;
    const sourceIndex = pointerRosterDrag.index;
    const didDrag = pointerRosterDrag.dragging;
    const targetSlot = didDrag ? getRosterSlotFromPoint(event.clientX, event.clientY) : null;
    const targetIndex = targetSlot ? Number(targetSlot.dataset.index) : sourceIndex;

    clearRosterDragState();
    pointerRosterDrag = null;
    if (didDrag) {
        setTimeout(() => { suppressRosterClick = false; }, 0);
    }

    if (didDrag && Number.isInteger(targetIndex) && targetIndex !== sourceIndex) {
        const movingSlot = roster[sourceIndex];
        roster[sourceIndex] = roster[targetIndex];
        roster[targetIndex] = movingSlot;
        renderRoster();
        updateDashboard();
    }
}

function getRosterSlotFromPoint(x, y) {
    const element = document.elementFromPoint(x, y);
    return element?.closest?.('.raid-slot') || null;
}

function addSpec(clsName, specName) {
    const idx = roster.findIndex(x => x === null);
    if (idx === -1) return;

    const clsData = DB[clsName];
    const specData = clsData.specs.find(s => s.name === specName);

    roster[idx] = {
        class: clsName,
        specName: specName,
        role: specData.role,
        classBuffs: clsData.classBuffs || [],
        classResists: clsData.classResists || [],
        specBuffs: specData.buffs || [],
        specDebuffs: specData.debuffs || []
    };

    renderRoster();
    updateDashboard();
}

function removeSlot(index) {
    if (roster[index]) {
        roster[index] = null;
        renderRoster();
        updateDashboard();
    }
}

function expandRoster() {
    if (roster.length >= MAX_ROSTER_SIZE) return;
    roster = roster.concat(Array(MAX_ROSTER_SIZE - roster.length).fill(null));
    renderRoster();
}

function clearRoster() {
    roster = Array(DEFAULT_ROSTER_SIZE).fill(null);
    renderRoster();
    updateDashboard();
}

function updateDashboard() {
    // 1. Calculate Counts
    const counts = {}; // Map of simplified ID -> count

    roster.forEach(slot => {
        if (!slot) return;
        const add = (name) => {
            const id = simplify(name);
            counts[id] = (counts[id] || 0) + 1;
        };
        
        slot.classBuffs.forEach(add);
        slot.classResists.forEach(add);
        slot.specBuffs.forEach(add);
        slot.specDebuffs.forEach(add);
    });

    // 2. Update UI
    document.querySelectorAll('.buff-item').forEach(el => {
        const id = el.id.replace('buff-', '');
        const count = counts[id] || 0;
        const icon = el.querySelector('.status-icon');

        if (count > 0) {
            el.classList.add('active');
            icon.innerText = count;
        } else {
            el.classList.remove('active');
            icon.innerText = '';
        }
    });
}

function simplify(str) {
    return canonicalBuffName(str).toLowerCase().replace(/[^a-z0-9]/g, '');
}

function canonicalBuffName(name) {
    return BUFF_ALIASES[name] || name;
}

function formatBuffName(name) {
    return DISPLAY_NAMES[canonicalBuffName(name)] || canonicalBuffName(name);
}

const CLASS_DISPLAY_NAMES = {
    WITCHDOCTOR: "Witch Doctor",
    FELSWORN: "Felsworn",
    WITCHHUNTER: "Witch Hunter",
    STORMBRINGER: "Stormbringer",
    KNIGHTXOROTH: "Knight of Xoroth",
    STARCALLER: "Starcaller",
    SUNCLERIC: "Sun Cleric",
    PRIMALIST: "Primalist",
    BLOODMAGE: "Bloodmage",
    RUNEMASTER: "Runemaster"
};

const SPEC_DISPLAY_NAMES = {
    BLACKKNIGHT: "Black Knight",
    "BLACK KNIGHT": "Black Knight",
    MOUNTAINKING: "Mountain King",
    "MOUNTAIN KING": "Mountain King",
    "MOON PRIEST": "Moon Priest",
    "MOON GUARD": "Moon Guard",
    ROT: "Rotweaver",
    ROTWEAVER: "Rotweaver"
};

function titleCaseLabel(name) {
    return String(name || '')
        .toLowerCase()
        .split(/\s+/)
        .filter(Boolean)
        .map(part => part.charAt(0).toUpperCase() + part.slice(1))
        .join(' ');
}

function formatClassName(clsName) {
    return CLASS_DISPLAY_NAMES[clsName] || titleCaseLabel(clsName);
}

function formatSpecName(specName) {
    return SPEC_DISPLAY_NAMES[specName] || titleCaseLabel(specName);
}

function specInitials(specName) {
    return specName
        .split(/\s+/)
        .map(part => part[0] || '')
        .join('')
        .slice(0, 2) || specName.substring(0, 2);
}

function textureSlug(textureName) {
    if (!textureName) return '';
    return textureName.replace(/\.(blp|png|tga|jpg)$/i, '').toLowerCase();
}

function classIconUrl(clsName) {
    const file = CLASS_ICON_FILES[clsName];
    return file ? `./assets/classes/${file}.png` : '';
}

function specIconUrls(clsName, specName) {
    const filename = SPEC_ICON_FILENAMES[clsName]?.[specName];
    const urls = [];
    const slug = textureSlug(filename);
    if (slug) {
        urls.push(`./assets/icons/${slug}.png`);
        urls.push(`./assets/icons/${slug}.jpg`);
    }
    const classUrl = classIconUrl(clsName);
    if (classUrl) urls.push(classUrl);
    return urls;
}

function createSpecIcon(clsName, specName, className) {
    const urls = specIconUrls(clsName, specName);
    const fallback = document.createElement('span');
    fallback.className = 'spec-fallback';
    fallback.innerText = specInitials(formatSpecName(specName));

    if (!urls.length) return fallback;

    const img = document.createElement('img');
    let index = 0;
    img.className = className;
    img.alt = `${formatSpecName(specName)} icon`;
    img.decoding = 'async';
    img.loading = 'lazy';
    img.addEventListener('error', () => {
        index += 1;
        if (index < urls.length) {
            img.src = urls[index];
            return;
        }
        img.replaceWith(fallback);
    });
    img.src = urls[index];
    return img;
}

// --- TOOLTIP ---
const tooltip = document.getElementById('tooltip');
const tooltipHeader = document.getElementById('tooltip-header');
const tooltipBody = document.getElementById('tooltip-body');

function showTooltip(e, data) {
    tooltip.style.display = 'block';
    tooltipHeader.innerHTML = `<h4>${formatSpecName(data.specName)}</h4><span>${formatClassName(data.class)}</span>`;
    let html = '';
    html += `<div class="tooltip-section"><h5># Class Buffs</h5><ul class="tooltip-list">`;
    const cBuffs = [...data.classBuffs, ...data.classResists];
    if (cBuffs.length) {
        html += cBuffs.map(b => `<li>${formatBuffName(b)}</li>`).join('');
    } else {
        html += `<li class="tooltip-empty">- None -</li>`;
    }
    html += `</ul></div>`;
    html += `<div class="tooltip-section"><h5># Spec Buffs</h5><ul class="tooltip-list">`;
    if (data.specBuffs.length) {
        html += data.specBuffs.map(b => `<li>${formatBuffName(b)}</li>`).join('');
    } else {
        html += `<li class="tooltip-empty">- None -</li>`;
    }
    html += `</ul></div>`;
    if (data.specDebuffs.length) {
        html += `<div class="tooltip-section"><h5># Boss Debuffs</h5><ul class="tooltip-list tooltip-debuff">`;
        html += data.specDebuffs.map(b => `<li>${formatBuffName(b)}</li>`).join('');
        html += `</ul></div>`;
    }
    tooltipBody.innerHTML = html;
    const x = e.clientX + 15;
    const y = e.clientY + 15;
    if (y + tooltip.offsetHeight > window.innerHeight) {
        tooltip.style.top = Math.max(10, e.clientY - tooltip.offsetHeight - 10) + 'px';
    } else {
        tooltip.style.top = y + 'px';
    }
    tooltip.style.left = Math.min(x, window.innerWidth - tooltip.offsetWidth - 10) + 'px';
}
function hideTooltip() {
    tooltip.style.display = 'none';
}

init();

</script>
